name: Refresh tournament data

on:
  schedule:
    - cron: '0 23 * * *'  # 00:00 CET
    - cron: '0 14 * * *'  # 15:00 CET
    - cron: '0 18 * * *'  # 19:00 CET
  workflow_dispatch:       # manual trigger from GH UI

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: pnpm install --frozen-lockfile

      - name: Refresh and commit if data changed
        run: |
          SUMMARY=$(pnpm run --silent refresh 2>&1)
          echo "$SUMMARY"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tournament.json
          git diff --staged --quiet && echo "No new data." || (
            git commit -m "data: refresh $(date -u +%Y-%m-%dT%H:%M)" -m "$SUMMARY" &&
            git push
          )
